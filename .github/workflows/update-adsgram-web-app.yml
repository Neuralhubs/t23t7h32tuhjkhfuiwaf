name: Update Telegram adsgram Web App Script

on:
  schedule:
    - cron: '0 * * * *'      # top of every hour
  workflow_dispatch:       # allows manual runs too

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download sad.min.js
        run: |
          curl -sSL https://sad.adsgram.ai/js/sad.min.js -o sad.min.js

      - name: Commit updated script
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet sad.min.js; then
            git add sad.min.js
            git commit -m "chore: update sad.min.js to $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No changes detected."
          fi
